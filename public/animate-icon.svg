<svg width="710" height="750" viewBox="0 0 710 750" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
  /* 全体の呼吸の動き（お腹がゆっくり膨らむ・縮む） */
  .cat-body {
    animation: breathe 4s ease-in-out infinite;
    transform-origin: 320px 700px; /* 胴体の下部を軸にする */
  }
  
  /* 頭の動き：呼吸に連動してゆっくり上下する */
  .cat-head-bob {
    animation: head-bob 4s ease-in-out infinite;
    transform-origin: 230px 300px; /* 首の付け根あたりを軸にする */
  }

  /* 耳/顔が時々ピクッとする動き（猫特有の警戒・反応） */
  .cat-ear-twitch {
    animation: ear-twitch 6s ease-in-out infinite;
    transform-origin: 230px 300px;
  }
  
  /* 左側のパーツ（しっぽや手足）がゆらゆら揺れる */
  .cat-left-part {
    animation: tail-swing-left 5s ease-in-out infinite;
    transform-origin: 100px 430px;
  }
  
  /* 右側のパーツ（しっぽや手足）がしなやかに動く */
  .cat-right-part {
    animation: tail-swing-right 6s ease-in-out infinite alternate;
    transform-origin: 590px 180px;
  }

  /* 小さな足先がたまにトントンと動く */
  .cat-paw {
    animation: paw-tap 7s ease-in-out infinite;
    transform-origin: 24px 708px;
  }

  /* --- キーフレーム（アニメーションの詳細な動き） --- */
  
  @keyframes breathe {
    0%, 100% { transform: scaleY(1) translateY(0); }
    50% { transform: scaleY(1.02) translateY(-3px); }
  }

  @keyframes head-bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  @keyframes ear-twitch {
    0%, 85%, 100% { transform: rotate(0deg); }
    88% { transform: rotate(3deg); }
    92% { transform: rotate(-2deg); }
    96% { transform: rotate(1deg); }
  }

  @keyframes tail-swing-left {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(-3deg); }
  }

  @keyframes tail-swing-right {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(2.5deg); }
  }

  @keyframes paw-tap {
    0%, 90%, 100% { transform: translateY(0); }
    93% { transform: translateY(-8px) rotate(-5deg); } /* ピクッと浮かせる */
    96% { transform: translateY(0) rotate(0deg); }
  }
</style>

